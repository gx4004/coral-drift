name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger it manually from GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GraalVM 21 with native-image support (required by Gluon Mobile)
      # Gluon's own GraalVM fork — ships with the exact CAP caches that
      # gluonfx-maven-plugin 1.0.22 expects (modern GraalVM JDK 21 doesn't).
      - name: Download Gluon GraalVM (Java 17)
        run: |
          GRAAL_URL="https://github.com/gluonhq/graal/releases/download/gluon-22.1.0.1-Final/graalvm-svm-java17-linux-gluon-22.1.0.1-Final.tar.gz"
          curl -fsSL "$GRAAL_URL" -o /tmp/graal.tar.gz
          sudo mkdir -p /opt/graalvm
          sudo tar xzf /tmp/graal.tar.gz -C /opt/graalvm --strip-components=1
          echo "JAVA_HOME=/opt/graalvm" >> $GITHUB_ENV
          echo "GRAALVM_HOME=/opt/graalvm" >> $GITHUB_ENV
          echo "/opt/graalvm/bin" >> $GITHUB_PATH
          /opt/graalvm/bin/java -version
          /opt/graalvm/bin/native-image --version

      # Gluon plugin requires Maven 3.8.x — ubuntu-latest ships with 3.9.x
      - name: Install Maven 3.8.8
        run: |
          curl -fsSL https://archive.apache.org/dist/maven/maven-3/3.8.8/binaries/apache-maven-3.8.8-bin.tar.gz -o /tmp/maven.tar.gz
          sudo tar xzf /tmp/maven.tar.gz -C /opt/
          echo "/opt/apache-maven-3.8.8/bin" >> $GITHUB_PATH
          /opt/apache-maven-3.8.8/bin/mvn -version

      # Android SDK is pre-installed on ubuntu-latest; install the NDK
      - name: Install Android NDK r25
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      # Cache Maven + Gluon native-image output to speed up repeat builds
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache Gluon native-image output
        uses: actions/cache@v4
        with:
          path: target/gluonfx
          key: ${{ runner.os }}-gluonfx-${{ hashFiles('src/**/*.java', 'pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-gluonfx-

      # The actual Gluon build — compile → link → package → APK
      - name: Build APK with Gluon Mobile
        run: |
          # Gluon downloads + manages its own Android SDK; clear conflicting vars
          unset ANDROID_SDK_ROOT
          unset ANDROID_HOME
          set +e
          mvn -Pandroid gluonfx:build gluonfx:package
          EXIT=$?
          if [ $EXIT -ne 0 ]; then
            echo "===== Dumping all gluonfx logs for diagnosis ====="
            find target/gluonfx -name "*.log" 2>/dev/null | while read f; do
              echo ""
              echo "===== $f ====="
              cat "$f"
            done
          fi
          exit $EXIT
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          # Bypass JDK 17 cgroup v2 NPE bug on modern Linux runners
          _JAVA_OPTIONS: "-XX:-UseContainerSupport"

      - name: Upload gluonfx logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gluonfx-logs
          path: target/gluonfx/**/*.log
          if-no-files-found: ignore

      # Upload APK as a downloadable artifact (available for 30 days)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: coral-drift-android
          path: target/gluonfx/aarch64-android/*.apk
          if-no-files-found: error
          retention-days: 30
