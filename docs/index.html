<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Coral Drift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: manipulation;
  }
  canvas {
    display: block;
    image-rendering: optimizeQuality;
  }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #ff69b4; font-size: 22px; z-index: 100;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="loading">Loading Coral Drift...</div>
<script src="game.js"></script>
</body>
</html>
